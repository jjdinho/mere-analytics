name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Single required status check. It always runs (so it never gets stuck
  # "pending" on docs-only PRs the way a path-filtered trigger would), but the
  # build/vet/lint/test work is gated on whether the PR touches Go code.
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Go changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'

      - name: Set up Go
        if: steps.changes.outputs.go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        if: steps.changes.outputs.go == 'true'
        run: go build ./...

      - name: Vet
        if: steps.changes.outputs.go == 'true'
        run: go vet ./...

      - name: Lint
        if: steps.changes.outputs.go == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # The codebase has pre-existing findings; grandfather them and only
          # fail on NEW issues a PR introduces.
          only-new-issues: true

      - name: Test
        if: steps.changes.outputs.go == 'true'
        # Excludes the two long-running container chaos tests.
        run: |
          go test -timeout 20m \
            -skip 'TestIngest_RecoverDLQDrainAfterCHRestart|TestIngest_RecoverFatalClearsAfterBothRestart' \
            ./...
